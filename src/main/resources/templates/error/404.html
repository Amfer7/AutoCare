<!-- ══ 404 NOT FOUND ══════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Not Found — AutoCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/autocare.css}" rel="stylesheet"/>
</head>
<body>
<div class="error-page">
  <div class="error-code animate-in">404</div>
  <h1 class="error-title animate-in animate-in-delay-1">Page Not Found</h1>
  <p class="error-desc animate-in animate-in-delay-2"
     th:text="${message ?: 'The page you\'re looking for doesn\'t exist or has been moved.'}"></p>
  <div style="display:flex;gap:12px;" class="animate-in animate-in-delay-3">
    <a href="javascript:history.back()" class="btn btn-secondary">← Go Back</a>
    <a th:href="@{/dashboard}" class="btn btn-primary">Go to Dashboard</a>
  </div>
</div>
</body>
</html>
