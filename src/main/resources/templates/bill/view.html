<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<th:block layout:fragment="page-title" th:text="'Bill #' + ${billDto.billId}">Bill</th:block>
<th:block layout:fragment="page-subtitle" th:text="${billDto.vehicleDisplayName}"></th:block>
<th:block layout:fragment="content">

  <div class="breadcrumb animate-in">
    <a th:href="@{/bill/list}">Bills</a>
    <span class="sep">/</span>
    <span class="current" th:text="'#' + ${billDto.billId}"></span>
  </div>

  <div th:if="${successMsg}" class="alert alert-success animate-in"><span th:text="${successMsg}"></span></div>
  <div th:if="${errorMsg}"   class="alert alert-error   animate-in"><span th:text="${errorMsg}"></span></div>

  <div style="max-width:600px;">

    <!-- Invoice header -->
    <div class="invoice-header animate-in">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:11px;color:var(--slate-500);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">
            AutoCare Invoice
          </div>
          <div style="font-family:'Playfair Display',serif;font-size:13px;color:var(--slate-400);"
               th:text="'Bill #' + ${billDto.billId}"></div>
        </div>
        <div th:if="${billDto.paid}"
             style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);
                    color:var(--green-400);padding:6px 16px;border-radius:99px;font-size:12px;font-weight:600;">
          ✓ PAID
        </div>
        <div th:unless="${billDto.paid}"
             style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);
                    color:var(--amber-400);padding:6px 16px;border-radius:99px;font-size:12px;font-weight:600;">
          UNPAID
        </div>
      </div>
      <div style="margin-top:20px;">
        <div class="invoice-total-label">Amount Due</div>
        <div class="invoice-total">
          ₹<span th:text="${#numbers.formatDecimal(billDto.totalAmount,1,'COMMA',2,'POINT')}"></span>
        </div>
      </div>
    </div>

    <!-- Details -->
    <div class="card animate-in animate-in-delay-1" style="margin-bottom:16px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div>
          <div style="font-size:11px;color:var(--slate-500);margin-bottom:4px;">Vehicle</div>
          <div style="font-size:13.5px;color:white;" th:text="${billDto.vehicleDisplayName}"></div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--slate-500);margin-bottom:4px;">Owner</div>
          <div style="font-size:13.5px;color:white;" th:text="${billDto.ownerName}"></div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--slate-500);margin-bottom:4px;">Technician</div>
          <div style="font-size:13.5px;color:white;" th:text="${billDto.staffName}"></div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--slate-500);margin-bottom:4px;">Generated</div>
          <div style="font-size:13.5px;color:white;" th:text="${billDto.generatedAt}"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="invoice-line">
        <span class="label">Labour Cost</span>
        <span class="value">₹<span th:text="${#numbers.formatDecimal(billDto.laborCost,1,'COMMA',2,'POINT')}"></span></span>
      </div>
      <div class="invoice-line">
        <span class="label">Parts Cost</span>
        <span class="value">₹<span th:text="${#numbers.formatDecimal(billDto.partsCost,1,'COMMA',2,'POINT')}"></span></span>
      </div>
      <div class="invoice-line">
        <span class="label">Subtotal</span>
        <span class="value">₹<span th:text="${#numbers.formatDecimal(billDto.subtotal,1,'COMMA',2,'POINT')}"></span></span>
      </div>
      <div class="invoice-line">
        <span class="label">GST (<span th:text="${billDto.taxRate}"></span>%)</span>
        <span class="value">₹<span th:text="${#numbers.formatDecimal(billDto.taxAmount,1,'COMMA',2,'POINT')}"></span></span>
      </div>
      <div class="invoice-line total">
        <span class="label">Total Amount</span>
        <span class="value">₹<span th:text="${#numbers.formatDecimal(billDto.totalAmount,1,'COMMA',2,'POINT')}"></span></span>
      </div>

      <div th:if="${billDto.notes != null and !billDto.notes.isEmpty()}"
           style="margin-top:16px;padding:12px;background:var(--slate-900);
                  border-radius:var(--radius-md);font-size:12.5px;color:var(--slate-400);">
        <span style="color:var(--slate-500);">Notes: </span>
        <span th:text="${billDto.notes}"></span>
      </div>
    </div>

    <!-- Pay button -->
    <div th:unless="${billDto.paid}" class="animate-in animate-in-delay-2">
      <form th:action="@{/bill/{id}/pay(id=${billDto.billId})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-primary w-full" style="justify-content:center;">
          💳 Mark as Paid
        </button>
      </form>
    </div>

    <div th:if="${billDto.paid}"
         style="text-align:center;padding:16px;color:var(--green-400);font-size:13.5px;" class="animate-in">
      ✓ Paid on <span th:text="${billDto.paidAt}"></span>
    </div>

  </div>

</th:block>
</html>
