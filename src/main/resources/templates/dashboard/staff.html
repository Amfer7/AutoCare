<!-- ════════════════════════════════════════════════════════════════════
     STAFF DASHBOARD — dashboard/staff.html
     ════════════════════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<th:block layout:fragment="page-title">Staff Dashboard</th:block>
<th:block layout:fragment="page-subtitle">Welcome, <span th:text="${staff.fullName}">Staff</span></th:block>
<th:block layout:fragment="topbar-actions">
  <a th:href="@{/service/all}" class="btn btn-primary btn-sm">View All Requests</a>
</th:block>
<th:block layout:fragment="content">

  <div class="grid grid-4" style="margin-bottom:28px;">
    <div class="stat-card amber animate-in">
      <div class="stat-icon amber">📋</div>
      <div class="stat-value" th:text="${pendingRequests.size()}" th:attr="data-count=${pendingRequests.size()}">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card blue animate-in animate-in-delay-1">
      <div class="stat-icon blue">⚙️</div>
      <div class="stat-value" th:text="${inProgressCount}" th:attr="data-count=${inProgressCount}">0</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-card green animate-in animate-in-delay-2">
      <div class="stat-icon green">✓</div>
      <div class="stat-value" th:text="${completedCount}" th:attr="data-count=${completedCount}">0</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat-card amber animate-in animate-in-delay-3">
      <div class="stat-icon amber">🔧</div>
      <div class="stat-value" th:text="${assignedRequests.size()}" th:attr="data-count=${assignedRequests.size()}">0</div>
      <div class="stat-label">My Assignments</div>
    </div>
  </div>

  <div class="grid grid-2">
    <!-- Pending requests queue -->
    <div class="card animate-in animate-in-delay-1">
      <div class="card-header">
        <div class="card-title">Pending Queue</div>
        <a th:href="@{/service/all?state=PENDING}" class="btn btn-ghost btn-sm">View All →</a>
      </div>
      <div th:if="${pendingRequests.empty}" class="empty-state" style="padding:32px 0;">
        <span class="empty-icon">✅</span>
        <div class="empty-title">Queue is clear!</div>
      </div>
      <div th:each="req, iter : ${pendingRequests}" th:if="${iter.index < 5}">
        <div style="padding:12px; border-radius:var(--radius-md); background:var(--slate-900);
                    margin-bottom:8px; border:1px solid rgba(255,255,255,0.05);">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
              <div style="font-weight:500; color:white; font-size:13.5px;"
                   th:text="${req.vehicle.displayName}"></div>
              <div style="font-size:12px; color:var(--slate-500); margin-top:2px;"
                   th:text="${#strings.abbreviate(req.description, 60)}"></div>
            </div>
            <a th:href="@{/service/{id}(id=${req.id})}" class="btn btn-primary btn-sm">Handle</a>
          </div>
          <div style="font-size:11px; color:var(--slate-600); margin-top:8px;"
               th:text="'Requested ' + ${#temporals.format(req.requestedAt,'dd MMM, hh:mm a')}"></div>
        </div>
      </div>
    </div>

    <!-- My assigned requests -->
    <div class="card animate-in animate-in-delay-2">
      <div class="card-header">
        <div class="card-title">My Assignments</div>
      </div>
      <div th:if="${assignedRequests.empty}" class="empty-state" style="padding:32px 0;">
        <span class="empty-icon">📋</span>
        <div class="empty-title">No assignments yet</div>
      </div>
      <div th:each="req, iter : ${assignedRequests}"
           th:if="${iter.index < 5 and req.state.name() != 'COMPLETED'}">
        <div style="display:flex; align-items:center; justify-content:space-between;
                    padding:11px; border-radius:var(--radius-md); background:var(--slate-900);
                    margin-bottom:8px; border:1px solid rgba(255,255,255,0.05);">
          <div>
            <div style="font-size:13.5px; font-weight:500; color:white;"
                 th:text="${req.vehicle.displayName}"></div>
            <div style="font-size:11.5px; color:var(--slate-500);"
                 th:text="${req.owner.fullName}"></div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span th:class="'badge ' + ${req.stateBadgeClass}" th:text="${req.state}"></span>
            <a th:href="@{/service/{id}(id=${req.id})}" class="btn btn-ghost btn-sm">→</a>
          </div>
        </div>
      </div>
    </div>
  </div>

</th:block>
</html>
