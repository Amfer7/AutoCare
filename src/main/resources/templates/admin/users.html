<!-- ══ ADMIN USERS ════════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<th:block layout:fragment="page-title">User Management</th:block>
<th:block layout:fragment="page-subtitle">Manage all system accounts</th:block>
<th:block layout:fragment="topbar-actions">
  <a th:href="@{/auth/register}" class="btn btn-primary btn-sm">+ Add User</a>
</th:block>
<th:block layout:fragment="content">

  <div th:if="${successMsg}" class="alert alert-success animate-in"><span th:text="${successMsg}"></span></div>
  <div th:if="${errorMsg}"   class="alert alert-error   animate-in"><span th:text="${errorMsg}"></span></div>

  <!-- Stats row -->
  <div style="display:flex;gap:16px;margin-bottom:24px;" class="animate-in">
    <div class="stat-card amber" style="flex:1;padding:16px;">
      <div style="font-size:11px;color:var(--slate-500);text-transform:uppercase;">Owners</div>
      <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--amber-400);"
           th:text="${ownerCount}">0</div>
    </div>
    <div class="stat-card blue" style="flex:1;padding:16px;">
      <div style="font-size:11px;color:var(--slate-500);text-transform:uppercase;">Staff</div>
      <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--blue-400);"
           th:text="${staffCount}">0</div>
    </div>
    <div class="stat-card green" style="flex:1;padding:16px;">
      <div style="font-size:11px;color:var(--slate-500);text-transform:uppercase;">Admins</div>
      <div style="font-family:'Playfair Display',serif;font-size:28px;color:var(--green-400);"
           th:text="${adminCount}">0</div>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs animate-in">
    <a th:href="@{/admin/users}" class="filter-tab" th:classappend="${filter == null} ? 'active'">All</a>
    <a th:href="@{/admin/users(role='OWNER')}"  class="filter-tab" th:classappend="${filter == 'OWNER'} ? 'active'">Owners</a>
    <a th:href="@{/admin/users(role='STAFF')}"  class="filter-tab" th:classappend="${filter == 'STAFF'} ? 'active'">Staff</a>
    <a th:href="@{/admin/users(role='ADMIN')}"  class="filter-tab" th:classappend="${filter == 'ADMIN'} ? 'active'">Admins</a>
  </div>

  <div class="card animate-in animate-in-delay-1">
    <div class="table-container">
      <table>
        <thead>
          <tr><th>Name</th><th>Email</th><th>Role</th><th>Details</th><th>Joined</th><th>Status</th><th></th></tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td>
              <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:32px;height:32px;background:rgba(245,158,11,0.1);border-radius:50%;
                            display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--amber-400);"
                     th:text="${#strings.substring(user.fullName,0,1).toUpperCase()}"></div>
                <span style="font-weight:500;color:white;" th:text="${user.fullName}"></span>
              </div>
            </td>
            <td th:text="${user.email}" class="text-muted"></td>
            <td>
              <span class="badge"
                    th:classappend="${user.role.name() == 'ADMIN'} ? 'badge-danger' :
                                     ${user.role.name() == 'STAFF'} ? 'badge-info' : 'badge-amber'"
                    th:text="${user.role}"></span>
            </td>
            <td class="text-muted" th:text="${user.phone ?: '—'}"></td>
            <td th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}" class="text-muted"></td>
            <td>
              <span th:if="${user.active}"  class="badge badge-success">Active</span>
              <span th:unless="${user.active}" class="badge badge-secondary">Inactive</span>
            </td>
            <td>
              <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-ghost btn-sm"
                        th:text="${user.active ? 'Deactivate' : 'Activate'}"></button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</th:block>
</html>
